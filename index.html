<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Devavāṇī — Learn Sanskrit · Aṣṭādhyāyī Sahajabodha</title>
  <meta name="description" content="Master Pāṇini's Aṣṭādhyāyī Sanskrit grammar through structured chapters, interactive flashcards, levelled quizzes, and Vedic text sources." />
  <meta name="theme-color" content="#F5F0E8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0E0D0A" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    /* Critical: prevent flash of wrong background */
    html, body, #root {
      background: #F5F0E8;
      min-height: 100%;
    }
    html[data-theme="dark"], html[data-theme="dark"] body, html[data-theme="dark"] #root {
      background: #0E0D0A;
    }
    body {
      margin: 0; padding: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Apply saved theme instantly before React hydrates */
    (function(){
      try {
        var t = localStorage.getItem('dv-theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
      } catch(e) {}
    })();
  </style>
  <script>
    // Apply saved theme BEFORE paint to prevent flash
    try {
      var t = localStorage.getItem('dv-theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    } catch(e) {}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
