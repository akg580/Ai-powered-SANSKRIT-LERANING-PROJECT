<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- SEO -->
  <title>Devavāṇī — Learn Sanskrit · Aṣṭādhyāyī Sahajabodha</title>
  <meta name="description" content="Master Pāṇini's Aṣṭādhyāyī Sanskrit grammar through structured chapters, interactive flashcards, levelled quizzes, and Vedic text sources. Pauspi Prakriyā method." />
  <meta name="theme-color" content="#0a0b14" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Devavāṇī — Sanskrit Grammar Learning Platform" />
  <meta property="og:description" content="Interactive Aṣṭādhyāyī learning: 7 chapters, 70+ terms, flashcards, quizzes, Vedic sources." />
  <meta property="og:type"        content="website" />

  <!-- Font preconnects -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Critical dark background to prevent flash of white -->
  <style>
    html, body, #root {
      background: #0a0b14;
      min-height: 100%;
    }
    body {
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Prevent horizontal overflow during animations */
      overflow-x: hidden;
    }
    /* Safe area support for mobile notch devices */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>

  <div id="root"></div>
